<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CodeView Report</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a1a; color: #eee; }
  .layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
  aside { background: #222; border-right: 1px solid #333; overflow-y: auto; padding: 12px; }
  aside h1 { font-size: 14px; margin: 0 0 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  aside ul { list-style: none; padding: 0; margin: 0; }
  aside li { padding: 8px; cursor: pointer; border-radius: 4px; font-size: 13px; }
  aside li:hover { background: #333; }
  aside li.active { background: #2d5fa0; }
  main { padding: 24px; overflow: auto; }
  main header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  main header h2 { margin: 0; font-size: 18px; }
  main header a { color: #6ab0ff; text-decoration: none; font-size: 13px; }
  main header a:hover { text-decoration: underline; }
  .stage { position: relative; display: inline-block; border: 1px solid #333; border-radius: 4px; background: #fff; }
  .stage img { display: block; max-width: 100%; }
  .overlay { position: absolute; box-sizing: border-box; cursor: pointer; border: 1px solid transparent; }
  .overlay:hover { border-color: #6ab0ff; background: rgba(106,176,255,0.15); }
  .overlay-tooltip { display: none; position: fixed; background: #222; color: #eee; padding: 6px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 9; white-space: nowrap; }
  .empty { color: #888; font-style: italic; }
</style>
</head>
<body>
<div class="layout">
  <aside>
    <h1>Previews</h1>
    <ul id="preview-list"></ul>
  </aside>
  <main>
    <header><h2 id="preview-title">No preview selected</h2><a id="open-source" href="#" target="_blank">Open in IDE &rarr;</a></header>
    <div id="preview-body"><p class="empty">Select a preview from the list.</p></div>
  </main>
</div>
<div id="tooltip" class="overlay-tooltip"></div>
<script id="codeview-data" type="application/json">__CODEVIEW_DATA__</script>
<script>
(function () {
  const data = JSON.parse(document.getElementById("codeview-data").textContent);
  const list = document.getElementById("preview-list");
  const title = document.getElementById("preview-title");
  const body = document.getElementById("preview-body");
  const openLink = document.getElementById("open-source");
  const tooltip = document.getElementById("tooltip");

  function showTooltip(e, text) {
    tooltip.textContent = text;
    tooltip.style.display = "block";
    tooltip.style.left = (e.clientX + 12) + "px";
    tooltip.style.top = (e.clientY + 12) + "px";
  }
  function hideTooltip() { tooltip.style.display = "none"; }

  function select(spec, li) {
    document.querySelectorAll("aside li.active").forEach(el => el.classList.remove("active"));
    li.classList.add("active");
    title.textContent = spec.displayName;
    openLink.href = spec.openUrl;
    if (!spec.imagePath) {
      body.innerHTML = '<p class="empty">No screenshot rendered yet. Run <code>./gradlew testDebugUnitTest</code>.</p>';
      return;
    }
    const stage = document.createElement("div");
    stage.className = "stage";
    const img = document.createElement("img");
    img.src = spec.imagePath;
    img.alt = spec.displayName;
    stage.appendChild(img);
    img.addEventListener("load", function () {
      const sx = img.clientWidth / spec.imageWidth;
      const sy = img.clientHeight / spec.imageHeight;
      spec.nodes.forEach(function (n) {
        const ov = document.createElement("a");
        ov.className = "overlay";
        ov.href = n.openUrl || spec.openUrl;
        ov.style.left = (n.bounds.x * sx) + "px";
        ov.style.top = (n.bounds.y * sy) + "px";
        ov.style.width = (n.bounds.width * sx) + "px";
        ov.style.height = (n.bounds.height * sy) + "px";
        ov.addEventListener("mousemove", function (e) { showTooltip(e, n.name); });
        ov.addEventListener("mouseleave", hideTooltip);
        stage.appendChild(ov);
      });
    });
    body.innerHTML = "";
    body.appendChild(stage);
  }

  data.previews.forEach(function (spec, idx) {
    const li = document.createElement("li");
    li.textContent = spec.displayName;
    li.addEventListener("click", function () { select(spec, li); });
    list.appendChild(li);
    if (idx === 0) select(spec, li);
  });
})();
</script>
</body>
</html>
