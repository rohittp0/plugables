name: Build and Publish

on:
  push:
    branches: [main]

jobs:
  detect:
    name: Detect changed plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.changed.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed plugins
        id: changed
        run: |
          plugins=$(
            git diff --name-only HEAD~1 HEAD 2>/dev/null \
              | grep -E '^[^/]+/build\.gradle\.kts$' \
              | cut -d/ -f1 \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )
          echo "plugins=${plugins:-[]}" >> "$GITHUB_OUTPUT"
          echo "Changed plugins: ${plugins:-[]}"

  publish:
    name: Publish ${{ matrix.plugin }}
    needs: detect
    if: needs.detect.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build and publish ${{ matrix.plugin }}
        run: ./gradlew :${{ matrix.plugin }}:build :${{ matrix.plugin }}:publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}