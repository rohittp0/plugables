name: Build and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      plugins:
        description: 'Comma-separated list of plugins to publish (e.g. viewmodel-stub,typed-events)'
        required: true
        type: string

jobs:
  detect:
    name: Detect changed plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.changed.outputs.plugins }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Find changed plugins
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            plugins=$(echo "${{ inputs.plugins }}" \
              | tr ',' '\n' | tr -d ' ' | grep -v '^$' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            # Only treat a plugin as changed if its `version = "..."` line was added or removed
            # in this push. Other build-script edits (publishing config, dep tweaks) don't
            # warrant a publish — Maven Central rejects republishing the same GAV anyway.
            changed_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
              | grep -E '^[^/]+/build\.gradle\.kts$' || true)
            list=()
            for f in $changed_files; do
              if git diff HEAD~1 HEAD -- "$f" | grep -qE '^[+-]version\s*=\s*"'; then
                list+=("$(dirname "$f")")
              fi
            done
            plugins=$(printf '%s\n' "${list[@]}" | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "plugins=${plugins:-[]}" >> "$GITHUB_OUTPUT"
          echo "Changed plugins: ${plugins:-[]}"

  publish:
    name: Publish ${{ matrix.plugin }}
    needs: detect
    if: needs.detect.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Build and publish ${{ matrix.plugin }}
        run: ./gradlew :${{ matrix.plugin }}:build :${{ matrix.plugin }}:publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
