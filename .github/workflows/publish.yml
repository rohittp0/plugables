name: Build and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      plugins:
        description: 'Comma-separated list of plugins to publish (e.g. viewmodel-stub,typed-events)'
        required: true
        type: string

jobs:
  detect:
    name: Detect changed plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.changed.outputs.plugins }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Find changed plugins
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            plugins=$(echo "${{ inputs.plugins }}" \
              | tr ',' '\n' | tr -d ' ' | grep -v '^$' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            plugins=$(
              git diff --name-only HEAD~1 HEAD 2>/dev/null \
                | grep -E '^[^/]+/build\.gradle\.kts$' \
                | cut -d/ -f1 \
                | sort -u \
                | jq -R -s -c 'split("\n") | map(select(length > 0))'
            )
          fi
          echo "plugins=${plugins:-[]}" >> "$GITHUB_OUTPUT"
          echo "Changed plugins: ${plugins:-[]}"

  publish:
    name: Publish ${{ matrix.plugin }}
    needs: detect
    if: needs.detect.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.detect.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Build and publish ${{ matrix.plugin }}
        run: ./gradlew :${{ matrix.plugin }}:build :${{ matrix.plugin }}:publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}